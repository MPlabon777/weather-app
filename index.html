<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <div class="weather-card">
            <div class="api-key-section" id="api-key-section" style="display: none;">
                <div class="api-key-box">
                    <label for="api-key-input">Enter your OpenWeatherMap API Key:</label>
                    <div class="api-key-input-group">
                        <input type="text" id="api-key-input" placeholder="Paste your API key here">
                        <button id="save-api-key-btn">Save</button>
                    </div>
                    <small>Get a free key at <a href="https://openweathermap.org/api" target="_blank">openweathermap.org/api</a></small>
                </div>
            </div>

            <div class="search-box">
                <input type="text" id="city-input" placeholder="Enter city name">
                <button id="search-btn">Search</button>
            </div>

            <div class="error-message" id="error-message"></div>

            <div class="weather-info" id="weather-info">
                <div class="location" id="location"></div>
                <div class="date" id="date"></div>

                <div class="main-weather">
                    <div class="temperature" id="temperature"></div>
                    <div class="weather-icon" id="weather-icon"></div>
                    <div class="description" id="description"></div>
                </div>

                <div class="details">
                    <div class="detail-item">
                        <span class="detail-label">Humidity</span>
                        <span class="detail-value" id="humidity"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Wind Speed</span>
                        <span class="detail-value" id="wind-speed"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Feels Like</span>
                        <span class="detail-value" id="feels-like"></span>
                    </div>
                    <div class="detail-item">
                        <span class="detail-label">Pressure</span>
                        <span class="detail-value" id="pressure"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
